<!DOCTYPE html>
<html lang="es">
<head>

    <title>Carta</title>

<body>

    <audio id="musicaCarta" loop>

    </audio>

    <main class="scene">

        <section class="envelope-stage" id="envelopeStage">

                            <strong>Oscar</strong>

                    </div>

                    </div>
                </header>

                <h2></h2>

                </section>

                <footer class="letter-footer">
                    <span>26 / 06</span>
                    <span></span>
                </footer>

                <nav class="bottom-menu" id="glassMenu">

            <div class="envelope" id="envelope">

                <div class="flap-right"></div>
                <div class="flap-bottom"></div>

            </p>

    <script src="sobre.js"></script>
</body>
</html>
