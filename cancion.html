<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canción</title>
    <link rel="stylesheet" href="cancion.css">
</head>
<body>

    <audio id="song">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <main class="player-page">

        <section class="turntable">

            <div class="knob volume-knob" id="volumeKnob"></div>

            <div class="record-area">
                <div class="record" id="record">
                    <div class="record-center"></div>
                </div>
            </div>

            <div class="tonearm" id="tonearm">
                <div class="arm-line"></div>
                <div class="needle"></div>
            </div>

            <div class="controls">

                <button class="control-btn" id="backBtn">
                    ↺
                </button>

                <button class="control-btn play-btn" id="playPauseBtn">
                    ▶
                </button>

                <div class="volume-control">
                    <span>Volumen</span>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
                </div>
                
                

            </div>

        </section>
        </section>
            <nav id="glassMenu" class="bottom-menu">
                <a href="ahoratu.html">Ahora tú.</a>
             </nav>
        </section>

    </main>

    <script src="cancion.js"></script>
</body>
</html>
