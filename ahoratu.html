<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahora tu</title>
    <link rel="stylesheet" href="ahoratu.css">
</head>
<body>

    <main class="container">

        <section class="message-card">

            <h1>¿Tienes algo que decirme?</h1>

            <p>Puedes escribir lo que quieras.</p>

            <textarea 
                id="message"
                placeholder="Escribe aquí..."
            ></textarea>

            <div class="buttons">

                <button id="sendBtn">
                    Enviar.
                </button>

                <button id="laterBtn">
                    Por ahora no.
                </button>

                <a href="cancion.html" class="glass-link">
                    Canción.
                </a>

            </div>

            <span id="statusMessage"></span>

        </section>

    </main>

    <script src="ahoratu.js"></script>
</body>
</html>
